name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "simulator/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "simulator/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend CI (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/CardioFlow.Api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Print .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

  frontend-ci:
    name: Frontend CI (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Print versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD || 'http://localhost:5050' }}
          VITE_SIGNALR_URL: ${{ secrets.VITE_SIGNALR_URL_PROD || 'http://localhost:5050/hubs/telemetry' }}
        run: npm run build

      - name: Upload frontend artifact (dist)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dashboard/dist
          if-no-files-found: error

  simulator-ci:
    name: Simulator CI (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simulator/mitbih-replay
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py producer.py replay.py
