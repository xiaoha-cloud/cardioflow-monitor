name: Deploy Frontend (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.FRONTEND_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
          VITE_SIGNALR_URL: ${{ secrets.VITE_SIGNALR_URL_PROD }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing: FRONTEND_DEPLOY_TOKEN / FRONTEND_ORG_ID / FRONTEND_PROJECT_ID"
            exit 1
          fi
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Missing required secret: VITE_API_BASE_URL_PROD"
            exit 1
          fi
          if [ -z "$VITE_SIGNALR_URL" ]; then
            echo "Missing required secret: VITE_SIGNALR_URL_PROD"
            exit 1
          fi

      # All Vercel CLI steps run from REPO ROOT (no working-directory).
      # Vercel reads Root Directory = frontend/dashboard from project settings,
      # builds there, and places .vercel/output at the repo root.

      - name: Pull Vercel environment information
        env:
          VERCEL_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.FRONTEND_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_PROJECT_ID }}
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.FRONTEND_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
          VITE_SIGNALR_URL: ${{ secrets.VITE_SIGNALR_URL_PROD }}
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.FRONTEND_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_PROJECT_ID }}
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
