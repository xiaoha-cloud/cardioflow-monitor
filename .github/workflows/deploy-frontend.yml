name: Deploy Frontend (Azure SWA)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
          VITE_SIGNALR_URL: ${{ secrets.VITE_SIGNALR_URL_PROD }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Missing required secret: VITE_API_BASE_URL_PROD"
            exit 1
          fi
          if [ -z "$VITE_SIGNALR_URL" ]; then
            echo "Missing required secret: VITE_SIGNALR_URL_PROD"
            exit 1
          fi
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/dashboard"
          output_location: "dist"
          skip_app_build: true
