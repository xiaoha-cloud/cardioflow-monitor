name: Deploy Frontend (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
          VITE_SIGNALR_URL: ${{ secrets.VITE_SIGNALR_URL_PROD }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Missing required secret: VITE_API_BASE_URL_PROD"
            exit 1
          fi
          if [ -z "$VITE_SIGNALR_URL" ]; then
            echo "Missing required secret: VITE_SIGNALR_URL_PROD"
            exit 1
          fi
          npm run build

      - name: Prepare Vercel output structure
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.FRONTEND_DEPLOY_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.FRONTEND_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secrets: FRONTEND_DEPLOY_TOKEN / FRONTEND_ORG_ID / FRONTEND_PROJECT_ID"
            exit 1
          fi
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
